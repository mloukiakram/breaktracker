<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Break Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --w:     #ffffff;
  --off:   #f6f6f6;
  --b1:    #e4e4e4;
  --b2:    #cccccc;
  --mu:    #999;
  --mi:    #666;
  --dk:    #2a2a2a;
  --bk:    #0c0c0c;
  --rad:   10px;
  --serif: 'DM Serif Display', Georgia, serif;
  --sans:  'Figtree', -apple-system, sans-serif;
}
html, body { font-family: var(--sans); background: var(--w); color: var(--bk); -webkit-font-smoothing: antialiased; min-height: 100vh; }

/* ── App shell ── */
#app { max-width: 460px; margin: 0 auto; padding: 0 20px 80px; }

/* ── Screen transitions ── */
.screen { display: none; }
.screen.on { display: block; }

/* ── Header ── */
.hd { padding: 44px 0 28px; border-bottom: 1px solid var(--b1); margin-bottom: 28px; }
.hd-eye  { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--mu); margin-bottom: 7px; }
.hd-title { font-family: var(--serif); font-size: 28px; font-weight: 400; line-height: 1.1; }
.hd-sub  { margin-top: 8px; font-size: 12px; color: var(--mu); font-variant-numeric: tabular-nums; }

/* ── Nav ── */
.nav { display: flex; border: 1px solid var(--b1); border-radius: var(--rad); overflow: hidden; margin-bottom: 28px; background: var(--off); }
.nv { flex: 1; padding: 11px 4px; font-family: var(--sans); font-size: 10px; font-weight: 700; letter-spacing: 1.3px; text-transform: uppercase; color: var(--mu); background: transparent; border: none; border-right: 1px solid var(--b1); cursor: pointer; transition: all .13s; }
.nv:last-child { border-right: none; }
.nv.on { background: var(--w); color: var(--bk); box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.nv:hover:not(.on) { color: var(--dk); }

/* ── Labels ── */
.lbl { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--mu); margin-bottom: 10px; }

/* ── Member grid (login) ── */
.mg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
.mc {
  padding: 14px; border: 1px solid var(--b1); border-radius: var(--rad); background: var(--w);
  cursor: pointer; transition: all .13s; display: flex; align-items: center; gap: 11px; user-select: none;
}
.mc:hover { border-color: var(--b2); background: var(--off); }
.mc.sel   { border-color: var(--bk); background: var(--bk); color: var(--w); }
.mc-init  { width: 32px; height: 32px; border-radius: 50%; background: var(--off); border: 1px solid var(--b1); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--dk); flex-shrink: 0; transition: all .13s; }
.mc.sel .mc-init { background: rgba(255,255,255,.13); border-color: rgba(255,255,255,.18); color: var(--w); }
.mc-n   { font-size: 14px; font-weight: 600; }
.mc-s   { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--mu); margin-top: 2px; }
.mc.sel .mc-s { color: rgba(255,255,255,.4); }

/* ── PIN pad ── */
.pin-wrap { padding: 20px 0 0; }
.pin-dots { display: flex; justify-content: center; gap: 13px; margin-bottom: 32px; }
.pd { width: 11px; height: 11px; border-radius: 50%; border: 1.5px solid var(--b2); background: var(--w); transition: all .12s; }
.pd.on { background: var(--bk); border-color: var(--bk); }
.pin-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; max-width: 210px; margin: 0 auto; }
.pk { aspect-ratio: 1; border: 1px solid var(--b1); border-radius: var(--rad); background: var(--w); font-family: var(--sans); font-size: 18px; font-weight: 500; color: var(--bk); cursor: pointer; transition: all .1s; display: flex; align-items: center; justify-content: center; }
.pk:hover  { background: var(--off); border-color: var(--b2); }
.pk:active { background: var(--b1); }
.pk.del    { font-size: 13px; color: var(--mu); }
.pin-err   { text-align: center; font-size: 12px; font-weight: 600; color: var(--dk); margin-top: 16px; min-height: 18px; letter-spacing: .2px; }
.pin-back  { display: block; text-align: center; margin-top: 24px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--mu); background: none; border: none; cursor: pointer; padding: 0; transition: color .12s; font-family: var(--sans); }
.pin-back:hover { color: var(--bk); }

/* ── Break type grid ── */
.bg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
.bc { padding: 14px 15px; border: 1px solid var(--b1); border-radius: var(--rad); background: var(--w); cursor: pointer; transition: all .13s; font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--dk); text-align: left; }
.bc:hover { border-color: var(--b2); background: var(--off); }
.bc.sel   { border-color: var(--bk); background: var(--bk); color: var(--w); }
.bc-sub   { font-size: 11px; font-weight: 400; color: var(--mu); margin-top: 3px; }
.bc.sel .bc-sub { color: rgba(255,255,255,.38); }

/* ── Buttons ── */
.btn { width: 100%; padding: 15px 18px; border-radius: var(--rad); font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: 1.3px; text-transform: uppercase; cursor: pointer; border: none; transition: all .13s; }
.btn-k { background: var(--bk); color: var(--w); }
.btn-k:hover:not(:disabled) { background: var(--dk); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,.13); }
.btn-k:disabled { background: var(--b1); color: var(--mu); cursor: not-allowed; }
.btn-o { background: var(--w); color: var(--bk); border: 1.5px solid var(--bk); }
.btn-o:hover { background: var(--bk); color: var(--w); }
.btn-g { background: var(--w); color: var(--bk); border: 1px solid var(--b2); }
.btn-g:hover { background: var(--off); }

/* ── Active break panel ── */
.ap { border: 1px solid var(--b1); border-radius: var(--rad); overflow: hidden; margin-bottom: 24px; }
.ap-r { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--b1); }
.ap-r:last-child { border-bottom: none; }
.ap-l { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--mu); }
.ap-v { font-size: 14px; font-weight: 600; }
.ap-t { font-size: 30px; font-weight: 300; letter-spacing: 3px; font-variant-numeric: tabular-nums; }

/* ── Live list ── */
.li-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--b1); }
.li-item:last-child { border-bottom: none; }
.li-n  { font-size: 14px; font-weight: 600; }
.li-m  { font-size: 12px; color: var(--mu); margin-top: 2px; }
.li-pill { font-size: 11px; font-weight: 700; letter-spacing: .4px; padding: 5px 10px; border: 1px solid var(--b2); border-radius: 6px; font-variant-numeric: tabular-nums; white-space: nowrap; }
.li-pill.ov { border-color: var(--bk); color: var(--bk); }
.at-r  { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid var(--b1); }
.at-r:last-child { border-bottom: none; }
.at-n  { font-size: 14px; font-weight: 500; color: var(--mu); }
.at-t  { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--mu); padding: 4px 9px; border: 1px solid var(--b1); border-radius: 5px; }

/* ── Summary ── */
.period-row { display: flex; gap: 6px; margin-bottom: 22px; }
.pb { padding: 8px 13px; font-family: var(--sans); font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; border: 1px solid var(--b1); border-radius: 6px; background: var(--w); color: var(--mu); cursor: pointer; transition: all .12s; }
.pb.on { border-color: var(--bk); background: var(--bk); color: var(--w); }
.pb:hover:not(.on) { color: var(--dk); border-color: var(--b2); }
.stats3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
.sb { padding: 14px 12px; border: 1px solid var(--b1); border-radius: var(--rad); }
.sb-n { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
.sb-l { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--mu); margin-top: 4px; }
.sm { padding: 15px 0; border-bottom: 1px solid var(--b1); }
.sm:last-child { border-bottom: none; }
.sm-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.sm-n   { font-size: 14px; font-weight: 700; }
.sm-v   { font-size: 12px; font-weight: 600; color: var(--mi); font-variant-numeric: tabular-nums; }
.sm-bar { height: 2px; background: var(--b1); border-radius: 1px; margin-bottom: 8px; }
.sm-fill { height: 100%; background: var(--bk); border-radius: 1px; transition: width .5s ease; }
.sm-types { display: flex; flex-wrap: wrap; gap: 5px; }
.sm-ty { font-size: 10px; font-weight: 600; color: var(--mi); padding: 3px 8px; border: 1px solid var(--b1); border-radius: 4px; }

/* ── Recent log ── */
.rl-item { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--b1); }
.rl-item:last-child { border-bottom: none; }
.rl-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--b2); flex-shrink: 0; }
.rl-info { font-size: 13px; font-weight: 500; }
.rl-sub  { font-size: 11px; color: var(--mu); margin-top: 2px; }
.rl-dur  { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--mi); white-space: nowrap; }

/* ── Misc ── */
.divider { border: none; border-top: 1px solid var(--b1); margin: 20px 0; }
.empty   { padding: 40px 0; text-align: center; font-size: 13px; color: var(--mu); }
.badge-member { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--off); border: 1px solid var(--b1); border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 24px; }
.logout-btn { background: none; border: none; font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--mu); cursor: pointer; padding: 0; transition: color .12s; margin-left: auto; }
.logout-btn:hover { color: var(--bk); }
.rr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.text-btn { background: none; border: none; font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--mu); cursor: pointer; padding: 0; transition: color .12s; }
.text-btn:hover { color: var(--bk); }

/* ── Toast ── */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(14px); opacity: 0; background: var(--bk); color: var(--w); font-size: 12px; font-weight: 600; letter-spacing: .4px; padding: 10px 18px; border-radius: 8px; transition: all .22s ease; z-index: 99; pointer-events: none; white-space: nowrap; }
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Spinner ── */
.sp { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,.25); border-top-color: rgba(255,255,255,.85); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">

  <!-- ═══ LOGIN SCREEN ═══ -->
  <div id="s-login" class="screen on">
    <div class="hd">
      <div class="hd-eye">Team Operations</div>
      <div class="hd-title">Break Tracker</div>
      <div class="hd-sub" id="login-clock">--:--:--</div>
    </div>
    <div class="lbl">Select Your Name</div>
    <div class="mg" id="login-members"></div>
    <!-- PIN entry (shown after member selected) -->
    <div id="pin-wrap" class="pin-wrap" style="display:none">
      <div class="lbl" style="text-align:center;margin-bottom:20px" id="pin-greeting">Enter your PIN</div>
      <div class="pin-dots">
        <div class="pd" id="pd0"></div><div class="pd" id="pd1"></div>
        <div class="pd" id="pd2"></div><div class="pd" id="pd3"></div>
      </div>
      <div class="pin-grid">
        <button class="pk" onclick="pk('1')">1</button>
        <button class="pk" onclick="pk('2')">2</button>
        <button class="pk" onclick="pk('3')">3</button>
        <button class="pk" onclick="pk('4')">4</button>
        <button class="pk" onclick="pk('5')">5</button>
        <button class="pk" onclick="pk('6')">6</button>
        <button class="pk" onclick="pk('7')">7</button>
        <button class="pk" onclick="pk('8')">8</button>
        <button class="pk" onclick="pk('9')">9</button>
        <button class="pk" onclick="pc()">C</button>
        <button class="pk" onclick="pk('0')">0</button>
        <button class="pk del" onclick="pd()">&#9003;</button>
      </div>
      <div class="pin-err" id="pin-err"></div>
      <button class="pin-back" onclick="backToNames()">Change Name</button>
    </div>
  </div>

  <!-- ═══ MAIN APP ═══ -->
  <div id="s-app" class="screen">
    <div class="hd">
      <div class="hd-eye">Team Operations</div>
      <div class="hd-title">Break Tracker</div>
      <div class="hd-sub" id="app-clock">--:--:--</div>
    </div>

    <!-- Member badge + logout -->
    <div style="display:flex;align-items:center;margin-bottom:24px;gap:10px;">
      <div class="badge-member" id="member-badge" style="margin-bottom:0">
        <span id="badge-init" style="width:22px;height:22px;border-radius:50%;background:var(--b1);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;letter-spacing:.4px"></span>
        <span id="badge-name"></span>
      </div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>

    <!-- Nav (admin gets 3 tabs, members get 2) -->
    <nav class="nav" id="main-nav">
      <button class="nv on" onclick="goTab('log')">Log Break</button>
      <button class="nv" onclick="goTab('live')">Live Status</button>
      <button class="nv" id="nav-summary" style="display:none" onclick="goTab('summary')">Summary</button>
    </nav>

    <!-- ── Log Break ── -->
    <div id="tab-log" class="screen on">
      <div id="ui-start">
        <div class="lbl">Type of Break</div>
        <div class="bg">
          <button class="bc" onclick="selBreak('Coffee')"  id="bt-Coffee" >Coffee <div class="bc-sub">Coffee break</div></button>
          <button class="bc" onclick="selBreak('Toilet')"  id="bt-Toilet" >Toilet <div class="bc-sub">Restroom break</div></button>
          <button class="bc" onclick="selBreak('Prayer')"  id="bt-Prayer" >Prayer <div class="bc-sub">Prayer break</div></button>
          <button class="bc" onclick="selBreak('Other')"   id="bt-Other"  >Other  <div class="bc-sub">Any other reason</div></button>
        </div>
        <button class="btn btn-k" id="btn-start" onclick="doStart()" disabled>Select a break type</button>
      </div>
      <div id="ui-end" style="display:none">
        <div class="ap">
          <div class="ap-r"><span class="ap-l">Break Type</span><span class="ap-v" id="ae-type">—</span></div>
          <div class="ap-r"><span class="ap-l">Started At</span><span class="ap-v" id="ae-start">—</span></div>
          <div class="ap-r" style="justify-content:center;padding:22px 18px;"><span class="ap-t" id="ae-timer">00:00</span></div>
        </div>
        <button class="btn btn-o" onclick="doEnd()">Back to Post</button>
      </div>
    </div>

    <!-- ── Live Status ── -->
    <div id="tab-live" class="screen">
      <div class="rr">
        <div class="lbl" style="margin-bottom:0">Currently on Break</div>
        <button class="text-btn" onclick="loadLive()">Refresh</button>
      </div>
      <div id="live-content"><div class="empty">Loading...</div></div>
    </div>

    <!-- ── Summary (admin) ── -->
    <div id="tab-summary" class="screen">
      <div class="rr">
        <div style="font-family:var(--serif);font-size:22px;font-weight:400;">Summary</div>
        <button class="text-btn" onclick="loadSummary(curPeriod)">Refresh</button>
      </div>
      <div class="period-row" style="margin-top:16px;">
        <button class="pb on" onclick="loadSummary('today')"  id="pb-today">Today</button>
        <button class="pb"    onclick="loadSummary('week')"   id="pb-week">Week</button>
        <button class="pb"    onclick="loadSummary('month')"  id="pb-month">Month</button>
      </div>
      <div id="summary-content"><div class="empty">Loading...</div></div>
    </div>

  </div><!-- /s-app -->

</div><!-- /app -->
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────
// Change this to your Netlify site URL during deployment
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8888/api'
  : '/api';

const MEMBERS = ['Oumaima','Charif','Khalid','Imane'];
const ADMIN   = 'Akram'; // must match ADMIN_NAME env var

// ─── STATE ───────────────────────────────────────────────────
let session     = JSON.parse(localStorage.getItem('bt_session') || 'null');
let loginMember = null;
let loginPin    = '';
let selBrk      = null;
let timerInt    = null;
let curPeriod   = 'today';
let activeCache = {};   // local optimistic cache

// ─── CLOCK ───────────────────────────────────────────────────
function tickClock() {
  const t = new Date().toLocaleTimeString('en-GB', { hour12: false });
  const a = document.getElementById('app-clock');
  const b = document.getElementById('login-clock');
  if (a) a.textContent = t;
  if (b) b.textContent = t;
}
setInterval(tickClock, 1000); tickClock();

// ─── API HELPER ──────────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (session) headers['Authorization'] = `Bearer ${session.member}:${session.token}`;
  try {
    const r = await fetch(API + path, { ...opts, headers: { ...headers, ...(opts.headers || {}) } });
    return await r.json();
  } catch {
    return { error: 'Network error' };
  }
}

// ─── INIT ─────────────────────────────────────────────────────
function init() {
  buildLoginGrid();
  if (session) {
    loadApp();
  }
}

// ─── LOGIN ────────────────────────────────────────────────────
function buildLoginGrid() {
  const allMembers = [...MEMBERS, ADMIN];
  const g = document.getElementById('login-members');
  g.innerHTML = '';
  allMembers.forEach(name => {
    const b = document.createElement('button');
    b.className = 'mc'; b.id = 'lm-' + name;
    b.onclick = () => pickLoginMember(name);
    b.innerHTML = `<div class="mc-init">${initials(name)}</div>
      <div><div class="mc-n">${name}</div><div class="mc-s">Select</div></div>`;
    g.appendChild(b);
  });
}

function pickLoginMember(name) {
  loginMember = name; loginPin = '';
  document.querySelectorAll('.mc').forEach(c => c.classList.remove('sel'));
  document.getElementById('lm-' + name)?.classList.add('sel');
  document.getElementById('pin-greeting').textContent = `PIN for ${name}`;
  document.getElementById('pin-err').textContent = '';
  renderPinDots();
  document.getElementById('pin-wrap').style.display = 'block';
}

function backToNames() {
  loginMember = null; loginPin = '';
  document.querySelectorAll('.mc').forEach(c => c.classList.remove('sel'));
  document.getElementById('pin-wrap').style.display = 'none';
}

function pk(k) {
  if (loginPin.length >= 4) return;
  loginPin += k; renderPinDots();
  if (loginPin.length === 4) doLogin();
}
function pd() { loginPin = loginPin.slice(0,-1); renderPinDots(); document.getElementById('pin-err').textContent = ''; }
function pc() { loginPin = ''; renderPinDots(); document.getElementById('pin-err').textContent = ''; }

function renderPinDots() {
  for (let i = 0; i < 4; i++) document.getElementById('pd'+i).classList.toggle('on', i < loginPin.length);
}

async function doLogin() {
  const res = await api('/login', {
    method: 'POST',
    body: JSON.stringify({ member: loginMember, pin: loginPin })
  });
  if (res.error) {
    document.getElementById('pin-err').textContent = 'Incorrect PIN — try again.';
    document.querySelectorAll('.pd').forEach(d => {
      d.style.background = '#111'; d.style.borderColor = '#111';
      setTimeout(() => { d.style.background = ''; d.style.borderColor = ''; }, 360);
    });
    setTimeout(() => { loginPin = ''; renderPinDots(); }, 440);
    return;
  }
  session = { member: res.member, token: res.token, isAdmin: res.isAdmin };
  localStorage.setItem('bt_session', JSON.stringify(session));
  loadApp();
}

function logout() {
  session = null;
  localStorage.removeItem('bt_session');
  activeCache = {}; selBrk = null;
  clearInterval(timerInt);
  show('s-login'); hide('s-app');
  backToNames();
}

// ─── APP ──────────────────────────────────────────────────────
async function loadApp() {
  show('s-app'); hide('s-login');

  // Set badge
  document.getElementById('badge-init').textContent = initials(session.member);
  document.getElementById('badge-name').textContent = session.member;

  // Admin nav tab
  if (session.isAdmin) document.getElementById('nav-summary').style.display = 'block';

  // Check if member is already on a break
  const me = await api('/me');
  if (me.onBreak && me.breakInfo) {
    activeCache[session.member] = me.breakInfo;
    showEndUI(me.breakInfo);
  } else {
    showStartUI();
  }

  goTab('log');
}

// ─── TAB NAVIGATION ──────────────────────────────────────────
const TAB_IDS = ['log','live','summary'];
function goTab(name) {
  document.querySelectorAll('.nv').forEach((b,i) => b.classList.toggle('on', TAB_IDS[i] === name));
  TAB_IDS.forEach(t => { const el = document.getElementById('tab-'+t); if(el) el.classList.remove('on'); });
  const tab = document.getElementById('tab-'+name);
  if (tab) tab.classList.add('on');
  if (name === 'live')    loadLive();
  if (name === 'summary') loadSummary(curPeriod);
}

// ─── BREAK: START ─────────────────────────────────────────────
function selBreak(t) {
  selBrk = t;
  document.querySelectorAll('.bc').forEach(b => b.classList.remove('sel'));
  document.getElementById('bt-'+t).classList.add('sel');
  const b = document.getElementById('btn-start');
  b.disabled = false;
  b.textContent = 'Start ' + t + ' Break';
}

function showStartUI() {
  document.getElementById('ui-start').style.display = 'block';
  document.getElementById('ui-end').style.display   = 'none';
  selBrk = null;
  document.querySelectorAll('.bc').forEach(b => b.classList.remove('sel'));
  const btn = document.getElementById('btn-start');
  btn.disabled = true; btn.textContent = 'Select a break type';
}

function showEndUI(info) {
  document.getElementById('ui-start').style.display = 'none';
  document.getElementById('ui-end').style.display   = 'block';
  document.getElementById('ae-type').textContent  = info.breakType;
  document.getElementById('ae-start').textContent = info.startTime;
  startTimer(info.startTs);
}

function startTimer(ts) {
  clearInterval(timerInt);
  const el = document.getElementById('ae-timer');
  timerInt = setInterval(() => {
    const s = Math.floor((Date.now() - ts) / 1000);
    el.textContent = pad(Math.floor(s/60)) + ':' + pad(s%60);
  }, 1000);
}

async function doStart() {
  if (!selBrk) return;
  const btn = document.getElementById('btn-start');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span>Logging...';

  // Optimistic: update UI immediately
  const now = new Date();
  const info = { breakType: selBrk, startTime: toTimeStr(now), startTs: now.getTime() };
  activeCache[session.member] = info;
  showEndUI(info);
  toast('Break started');

  const res = await api('/break/start', { method: 'POST', body: JSON.stringify({ breakType: selBrk }) });
  if (res.error) {
    // Rollback
    delete activeCache[session.member];
    showStartUI(); toast(res.error);
  } else {
    activeCache[session.member].startTs = res.timestamp;
  }
}

async function doEnd() {
  const btn = document.querySelector('.btn-o');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span>Saving...';

  // Optimistic
  const info = activeCache[session.member];
  delete activeCache[session.member];
  showStartUI();
  toast('Saved — returning...');

  const res = await api('/break/end', { method: 'POST' });
  if (res.error) {
    // Rollback
    activeCache[session.member] = info;
    showEndUI(info); toast(res.error);
  } else {
    toast('Saved — ' + res.duration + ' min');
  }
}

// ─── LIVE STATUS ──────────────────────────────────────────────
async function loadLive() {
  document.getElementById('live-content').innerHTML = '<div class="empty">Loading...</div>';
  const res = await api('/breaks/active');
  if (res.error) { document.getElementById('live-content').innerHTML = '<div class="empty">Failed to load.</div>'; return; }

  const allMembers = [...MEMBERS, ...(session.isAdmin ? [ADMIN] : [])];
  const onBreak    = res.active || [];
  const onNames    = onBreak.map(a => a.member);
  const atPost     = allMembers.filter(m => !onNames.includes(m));

  let html = '';
  if (onBreak.length) {
    onBreak.forEach(a => {
      html += `<div class="li-item">
        <div><div class="li-n">${a.member}</div><div class="li-m">${a.breakType} &middot; since ${a.startTime}</div></div>
        <div class="li-pill ${a.elapsedMins > 15 ? 'ov' : ''}">${a.elapsedMins}&thinsp;min</div>
      </div>`;
    });
  }
  if (atPost.length) {
    if (onBreak.length) html += `<div style="height:14px"></div><div class="lbl">At Post</div>`;
    atPost.forEach(m => {
      html += `<div class="at-r"><span class="at-n">${m}</span><span class="at-t">At Post</span></div>`;
    });
  }
  document.getElementById('live-content').innerHTML = html || '<div class="empty">Everyone is at their post</div>';
}

// ─── SUMMARY ─────────────────────────────────────────────────
async function loadSummary(period) {
  curPeriod = period;
  document.querySelectorAll('.pb').forEach(b => b.classList.remove('on'));
  document.getElementById('pb-'+period).classList.add('on');
  document.getElementById('summary-content').innerHTML = '<div class="empty">Loading...</div>';

  const res = await api('/summary?period=' + period);
  if (res.error) { document.getElementById('summary-content').innerHTML = '<div class="empty">'+res.error+'</div>'; return; }
  if (!res.count) { document.getElementById('summary-content').innerHTML = '<div class="empty">No data for this period</div>'; return; }

  const totals = Object.values(res.memberStats);
  const total  = totals.reduce((s,m) => s+m.total, 0);
  const avg    = Math.round(total / res.count);
  const maxT   = Math.max(...totals.map(m => m.total));
  const sorted = Object.entries(res.memberStats).sort((a,b) => b[1].total - a[1].total);

  let html = `<div class="stats3">
    <div class="sb"><div class="sb-n">${res.count}</div><div class="sb-l">Breaks</div></div>
    <div class="sb"><div class="sb-n">${total}m</div><div class="sb-l">Total</div></div>
    <div class="sb"><div class="sb-n">${avg}m</div><div class="sb-l">Avg</div></div>
  </div>
  <div class="lbl">Per Member</div><hr class="divider" style="margin-top:10px;margin-bottom:0">`;

  sorted.forEach(([name, st]) => {
    const pct   = maxT > 0 ? Math.round(st.total / maxT * 100) : 0;
    const flags = [];
    if (st.total > 60)   flags.push('High total');
    if (st.longest > 25) flags.push('Long break');
    const types = Object.entries(st.types).sort((a,b)=>b[1]-a[1])
      .map(([t,n]) => `<span class="sm-ty">${t} &times;${n}</span>`).join('');
    html += `<div class="sm">
      <div class="sm-top">
        <span class="sm-n">${name}</span>
        <span class="sm-v">${st.total}m &middot; ${st.count} break${st.count>1?'s':''} &middot; max ${st.longest}m</span>
      </div>
      <div class="sm-bar"><div class="sm-fill" style="width:${pct}%"></div></div>
      <div class="sm-types">${types}</div>
    </div>`;
  });

  if (res.recent?.length) {
    html += `<hr class="divider"><div class="lbl">Recent Entries</div>`;
    res.recent.slice(0,15).forEach(r => {
      html += `<div class="rl-item">
        <div class="rl-dot"></div>
        <div><div class="rl-info">${r.member} &mdash; ${r.breakType}</div><div class="rl-sub">${r.date} &middot; ${r.startTime} &rarr; ${r.endTime}</div></div>
        <div class="rl-dur">${r.duration}m</div>
      </div>`;
    });
  }

  document.getElementById('summary-content').innerHTML = html;
}

// ─── UTILS ───────────────────────────────────────────────────
function initials(name) { return name.slice(0,2).toUpperCase(); }
function pad(n) { return String(n).padStart(2,'0'); }
function toTimeStr(d) { return d.toLocaleTimeString('en-GB', { hour12: false }); }
function show(id) { const el = document.getElementById(id); if(el) el.classList.add('on'); }
function hide(id) { const el = document.getElementById(id); if(el) el.classList.remove('on'); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 2600);
}

init();
</script>
</body>
</html>
